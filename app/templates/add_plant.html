{% extends 'base.html' %}

{% block content %}
    <h1>Add a New Plant</h1>
    
    <div id="plant-search">
        <h2>Search for a Plant</h2>
        <input type="text" id="search-input" placeholder="Enter a plant name">
        <button id="search-button">Search</button>
        <div id="search-results"></div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchButton = document.getElementById('search-button');

        const performSearch = () => {
            const plantName = searchInput.value;
            if (plantName) {
                fetch(`/api/plant-info/${encodeURIComponent(plantName)}`)
                    .then(response => response.json())
                    .then(data => {
                        const resultsDiv = document.getElementById('search-results');
                        resultsDiv.innerHTML = '';
                        if (data.error) {
                            resultsDiv.innerHTML = `<p>${data.error}</p>`;
                        } else if (data.data && data.data.length > 0) {
                            data.data.forEach(plant => {
                                const plantDiv = document.createElement('div');
                                plantDiv.innerHTML = `
                                    <p>
                                        <strong>${plant.common_name || plant.scientific_name}</strong>
                                        (${plant.scientific_name})
                                        <button class="select-plant" data-name="${plant.common_name || plant.scientific_name}" data-scientific-name="${plant.scientific_name}">Select</button>
                                    </p>
                                `;
                                resultsDiv.appendChild(plantDiv);
                            });
                        } else {
                            resultsDiv.innerHTML = '<p>No plants found.</p>';
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        const resultsDiv = document.getElementById('search-results');
                        resultsDiv.innerHTML = '<p>Error fetching plant data.</p>';
                    });
            }
        };

        searchButton.addEventListener('click', performSearch);

        searchInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                performSearch();
            }
        });

        document.getElementById('search-results').addEventListener('click', (event) => {
            if (event.target.classList.contains('select-plant')) {
                const name = event.target.getAttribute('data-name');
                const scientificName = event.target.getAttribute('data-scientific-name');

                const addPlant = (lat, lng) => {
                    const body = { name: name, scientific_name: scientificName };
                    if (lat !== null && lng !== null) {
                        body.lat = lat;
                        body.lng = lng;
                    }
                    fetch('/api/add-plant-from-trefle', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.error) {
                            document.getElementById('search-results').innerHTML = `<p>${data.error}</p>`;
                        } else if (data.url) {
                            window.location.href = data.url;
                        }
                    })
                    .catch(error => console.error('Error:', error));
                };

                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => addPlant(pos.coords.latitude, pos.coords.longitude),
                        () => addPlant(null, null),
                        { timeout: 5000 }
                    );
                } else {
                    addPlant(null, null);
                }
            }
        });
    </script>
{% endblock %}
