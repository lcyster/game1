{% extends 'base.html' %}

{% block content %}
    <h1>Add a New Plant</h1>

    <div id="plant-search">
        <h2>Search for a Plant</h2>
        <input type="text" id="search-input" placeholder="Enter a plant name">
        <button id="search-button">Search</button>
        <div id="search-results"></div>
    </div>

    <hr style="margin: 24px 0;">

    <div id="photo-upload">
        <h2>Or Upload a Photo</h2>
        <p>Take a photo with your phone — GPS location will be extracted automatically.</p>
        <form id="upload-form" enctype="multipart/form-data">
            <div style="margin-bottom: 8px;">
                <label for="upload-name">Plant Name:</label>
                <input type="text" id="upload-name" name="name" required placeholder="e.g. California-poppy">
            </div>
            <div style="margin-bottom: 8px;">
                <label for="upload-scientific-name">Scientific Name:</label>
                <input type="text" id="upload-scientific-name" name="scientific_name" placeholder="e.g. Eschscholzia californica">
            </div>
            <div style="margin-bottom: 8px;">
                <label for="upload-photo">Photo:</label>
                <input type="file" id="upload-photo" name="photo" accept="image/*" capture="environment" required>
            </div>
            <div id="gps-preview" style="margin-bottom: 8px; color: #666; font-size: 0.9em;"></div>
            <button type="submit">Add Plant</button>
        </form>
        <div id="upload-status"></div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchButton = document.getElementById('search-button');

        const performSearch = () => {
            const plantName = searchInput.value;
            if (plantName) {
                fetch(`/api/plant-info/${encodeURIComponent(plantName)}`)
                    .then(response => response.json())
                    .then(data => {
                        const resultsDiv = document.getElementById('search-results');
                        resultsDiv.innerHTML = '';
                        if (data.error) {
                            resultsDiv.innerHTML = `<p>${data.error}</p>`;
                        } else if (data.data && data.data.length > 0) {
                            data.data.forEach(plant => {
                                const plantDiv = document.createElement('div');
                                plantDiv.innerHTML = `
                                    <p>
                                        <strong>${plant.common_name || plant.scientific_name}</strong>
                                        (${plant.scientific_name})
                                        <button class="select-plant" data-name="${plant.common_name || plant.scientific_name}" data-scientific-name="${plant.scientific_name}">Select</button>
                                    </p>
                                `;
                                resultsDiv.appendChild(plantDiv);
                            });
                        } else {
                            resultsDiv.innerHTML = '<p>No plants found.</p>';
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        const resultsDiv = document.getElementById('search-results');
                        resultsDiv.innerHTML = '<p>Error fetching plant data.</p>';
                    });
            }
        };

        searchButton.addEventListener('click', performSearch);

        searchInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                performSearch();
            }
        });

        document.getElementById('search-results').addEventListener('click', (event) => {
            if (event.target.classList.contains('select-plant')) {
                const name = event.target.getAttribute('data-name');
                const scientificName = event.target.getAttribute('data-scientific-name');

                const addPlant = (lat, lng) => {
                    const body = { name: name, scientific_name: scientificName };
                    if (lat !== null && lng !== null) {
                        body.lat = lat;
                        body.lng = lng;
                    }
                    fetch('/api/add-plant-from-trefle', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.error) {
                            document.getElementById('search-results').innerHTML = `<p>${data.error}</p>`;
                        } else if (data.url) {
                            window.location.href = data.url;
                        }
                    })
                    .catch(error => console.error('Error:', error));
                };

                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => addPlant(pos.coords.latitude, pos.coords.longitude),
                        () => addPlant(null, null),
                        { timeout: 5000 }
                    );
                } else {
                    addPlant(null, null);
                }
            }
        });

        const uploadForm = document.getElementById('upload-form');
        const photoInput = document.getElementById('upload-photo');
        const gpsPreview = document.getElementById('gps-preview');

        photoInput.addEventListener('change', () => {
            const file = photoInput.files[0];
            if (!file) {
                gpsPreview.textContent = '';
                return;
            }
            gpsPreview.textContent = 'Reading photo...';
        });

        uploadForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const statusDiv = document.getElementById('upload-status');
            statusDiv.textContent = 'Uploading...';

            const formData = new FormData(uploadForm);

            fetch('/api/upload-plant-photo', {
                method: 'POST',
                body: formData,
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    statusDiv.textContent = data.error;
                } else if (data.url) {
                    if (data.gps) {
                        statusDiv.textContent = `GPS found: ${data.gps.lat.toFixed(4)}, ${data.gps.lng.toFixed(4)}. Redirecting...`;
                    } else {
                        statusDiv.textContent = 'No GPS data in photo. Redirecting...';
                    }
                    setTimeout(() => { window.location.href = data.url; }, 1000);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                statusDiv.textContent = 'Upload failed.';
            });
        });
    </script>
{% endblock %}
